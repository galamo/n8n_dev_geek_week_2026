# MySQL override for n8n
#
# Optional bind mount: replace mysql_data below with ./data/mysql:/var/lib/mysql

services:
  postgres:
    profiles:
      - disabled

  pgadmin:
    profiles:
      - disabled

  mysql:
    image: mysql:8.4
    container_name: n8n-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: n8n
      MYSQL_USER: n8n
      MYSQL_PASSWORD: n8n_password_change_me
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - n8n

  n8n:
    environment: !override
      DB_TYPE: mysqldb
      DB_MYSQLDB_HOST: mysql
      DB_MYSQLDB_PORT: 3306
      DB_MYSQLDB_DATABASE: n8n
      DB_MYSQLDB_USER: n8n
      DB_MYSQLDB_PASSWORD: n8n_password_change_me
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: UTC
      TZ: UTC
      N8N_ENCRYPTION_KEY: change_me_to_a_long_random_string
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    depends_on: !reset
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
