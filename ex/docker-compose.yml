# Pinecone Local — vector store emulator for local development
#
# Start:
#   cd ex
#   docker compose up -d
#
# Stop:
#   docker compose down
#
# Connect:
#   Host:    http://localhost:5080
#   API key: any value (e.g. pclocal) — authentication is disabled locally
#
# Limitations:
# - In-memory only; data is lost when the container stops
# - Development/testing only — not for production

services:
  pinecone:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    container_name: pinecone-local
    restart: unless-stopped
    environment:
      PORT: 5080
      PINECONE_HOST: localhost
    ports:
      - "5080-5090:5080-5090"
    platform: linux/amd64
